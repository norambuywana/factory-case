services:
  api:
    build: .
    container_name: factory-case-api
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npx tsx watch src/server.ts

  db:
    image: postgres:15-alpine
    container_name: factory-case-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: factory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:8-alpine
    container_name: factory-case-redis
    ports:
      - "6379:6379"
volumes:
  pgdata: